buildscript {
    repositories {
        mavenCentral()
    }
}

plugins {
    id 'java'
    id 'checkstyle'
    id 'groovy'
    id 'jacoco'
}

apply plugin: 'java'

// Build type: "dev" (default) or "production"
// Usage: gradle cap -Pbuild_type=production
if (!project.hasProperty("build_type")) {
    ext.build_type = "dev"
}

// Generate BuildConfig.java with the production flag
task generateBuildConfig {
    def outputDir = file("src/main/java/emvcardsimulator")
    def isProduction = (build_type == "production")

    outputs.file(new File(outputDir, "BuildConfig.java"))

    doLast {
        def buildConfigFile = new File(outputDir, "BuildConfig.java")
        buildConfigFile.text = """package emvcardsimulator;

/**
 * Build configuration constants — generated by Gradle.
 * Build type: ${build_type}
 *
 * When PRODUCTION is true, admin/personalization commands (80xx) are stripped
 * from the applet. The card can only be personalized via GP STORE DATA.
 */
public class BuildConfig {
    public static final boolean PRODUCTION = ${isProduction};
}
"""
    }
}

compileJava.dependsOn generateBuildConfig

// set default properties
// override in command line like: gradle deployPaymentApp -Pjc_version=2.2.2 -Ppaymentapp_cap_aid=A000000123456
if (!project.hasProperty("jc_version")) {
    ext.jc_version = "3.0.5"
}
if (!project.hasProperty("paymentapp_cap_aid")) {
    ext.paymentapp_cap_aid = "A000000951000000"
}
if (!project.hasProperty("paymentapp_applet_aid")) {
    ext.paymentapp_applet_aid = "A0000009510001"
}
// Contactless payment app (same code, different AID for T=1 protocol)
if (!project.hasProperty("paymentapp_contactless_cap_aid")) {
    ext.paymentapp_contactless_cap_aid = "A000000951100000"
}
if (!project.hasProperty("paymentapp_contactless_applet_aid")) {
    ext.paymentapp_contactless_applet_aid = "A0000009511010"
}

// 3.1.0 targeting does not work
/*if (jc_version == "3.1.0") {
    // class major version 51
    ext.java_version_compatible = 1.8
    ext.jc_sdk = "jc310b43_kit"
} else*/ if (jc_version == "3.0.5") {
    // class major version 51 - Java 1.7 required for JavaCard 3.0.5
    ext.java_version_compatible = 1.7
    ext.jc_sdk = "jc305u3_kit"
} else if (jc_version == "3.0.4") {
    // class major version 50 - Java 1.6 required but not supported by Java 17+
    // Use jc_version=3.0.5 instead or install older JDK
    ext.java_version_compatible = 1.7
    ext.jc_sdk = "jc304_kit"
} else if (jc_version == "3.0.1") {
    // class major version 50 - using 1.8 for modern Java compiler compatibility
    ext.java_version_compatible = 1.8
    ext.jc_sdk = "jc303_kit"
} else if (jc_version == "2.2.2") {
    // class major version 49 (Java 1.5) required for JavaCard 2.2.2
    ext.java_version_compatible = 1.5
    ext.jc_sdk = "jc222_kit"
} else if (jc_version == "2.2.1") {
    // class major version 46 - using 1.8 for modern Java compiler compatibility
    ext.java_version_compatible = 1.8
    ext.jc_sdk = "jc221_kit"
} else {
    throw new GradleException("JavaCard version not recognized: ${jc_version}")
}

// Nix-shell pure environment's gradle does not find cargo somehow
// working around via bash/cmd call
ext.cmd_shell = "bash"
ext.cmd_shell_option = "-c"
if (System.properties['os.name'].toLowerCase().contains('windows')) {
    ext.cmd_shell = "cmd"
    ext.cmd_shell_option = "/c"
}

task buildSimulatorLibrary(type: Exec) {
    group "Build"
    description "Build Rust simulator library"
    workingDir 'src/test/rust/simulator'

    // Skip if cargo is not available (CI environment without Rust)
    onlyIf {
        try {
            def result = "${cmd_shell} ${cmd_shell_option} 'cargo --version'".execute()
            result.waitFor()
            return result.exitValue() == 0
        } catch (Exception e) {
            return false
        }
    }

    commandLine "${cmd_shell}", "${cmd_shell_option}", 'cargo build'
}

tasks.withType(Test) {
    // Set absolute path to the Rust simulator library
    def projectDir = project.projectDir.absolutePath
    systemProperty "java.library.path", "${projectDir}/src/test/rust/simulator/target/debug/"
}

checkstyle {
    // Align version with verification-metadata.xml
    toolVersion '8.27';
}

checkstyleMain {
    source ='src/main/java'
    maxWarnings = 0
}

checkstyleTest {
    source ='src/test/java'
    maxWarnings = 0
}


repositories {
    mavenCentral()
}

configurations {
    javacardAntTask
}

dependencies {
    // Use consistent JUnit 5 version
    def junitVersion = '5.9.3'
    
    testImplementation platform("org.junit:junit-bom:${junitVersion}")
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    testImplementation 'com.klinec:jcardsim:latest.release'
    implementation 'com.klinec:jcardsim:latest.release'
    javacardAntTask 'com.github.martinpaljak:ant-javacard:latest.release'
}

test {
    dependsOn buildSimulatorLibrary
    workingDir 'src/test/java/emvcardsimulator'

    useJUnitPlatform() {
        // Exclude SimulatorTest which requires native library
        excludeEngines 'junit-vintage'
    }
    
    // Exclude SimulatorTest by pattern
    exclude '**/SimulatorTest.class'

    testLogging {
        outputs.upToDateWhen { false }
        events "started", "skipped", "failed", "passed"
        exceptionFormat "full"
        showStandardStreams true
        showExceptions true
        showCauses true
        showStackTraces true
    }

    failFast = false
    
    // Add more debug output
    beforeTest { descriptor ->
        logger.lifecycle("Running test: ${descriptor}")
    }
    
    afterTest { descriptor, result ->
        logger.lifecycle("Test ${descriptor} completed with result: ${result.resultType}")
    }
    
    // Don't ignore test failures
    ignoreFailures = false

    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }

    // Only measure coverage on the applet source code, not test helpers
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, include: 'emvcardsimulator/**')
        }))
    }
}

compileJava {
    options.compilerArgs = [
            '-Xlint:all',
            '-Xlint:-options', //java 13 warns about Java 7 targetting
            '-Xlint:-deprecation', // Some Java Card features are deprecated in 3.0.5 but we target earlier versions
            '-Werror'
    ]

    // Use --release for proper cross-compilation with modern JDK
    // This ensures both API and bytecode compatibility
    // Note: --release doesn't support versions below 6, so use source/target for JC 2.2.x
    def targetVersion = java_version_compatible.toString().replace("1.", "").toInteger()
    if (JavaVersion.current().isJava9Compatible() && targetVersion >= 6) {
        options.release = targetVersion
    } else {
        // For Java 1.5 targeting (JC 2.2.2), use source/target with forked javac
        sourceCompatibility = java_version_compatible
        targetCompatibility = java_version_compatible
    }

    // in case need to target for very old Java class major version
    if (project.hasProperty("compile_javac_path")) {
        options.fork = true
        options.forkOptions.executable = "${compile_javac_path}"
    }
}

compileTestJava {
    options.compilerArgs = [
            '-Xlint:all',
            '-Xlint:-options', //java 13 warns about Java 7 targetting
            '-Werror'
    ]
    // JUnit 5 requires Java 8 or newer
    sourceCompatibility = 1.8
    targetCompatibility = 1.8
}

task downloadGp {
    doLast {
        String gpJar = 'gp.jar'
        if (!new File(gpJar).exists()) {
            String checksumExtension = '.sha512.tmp'
            String gpJarTemp = gpJar + checksumExtension

            ant.get(src: 'https://github.com/martinpaljak/GlobalPlatformPro/releases/download/v20.07.04/gp.jar', dest:gpJar)

            ant.checksum(file: gpJar, algorithm:'SHA-512', fileext: checksumExtension)
            String expectedChecksum = "4030c6eb46fb932c167f9a53fdbfab6b1364dbaafad5068b5bfc9779140cc1659e655d5ff53ee20d2823163011ede3ec9c3916632c2173cb6a1e17b84389490a"
            String actualChecksum = new File(gpJarTemp).text.trim()
            delete gpJarTemp

            if (!expectedChecksum.equals(actualChecksum)) {
                throw new GradleException("Checksum not valid! file: " + gpJar + ", expected: " + expectedChecksum + ", actual: " + actualChecksum)        
            }
        }
    }
}

task cap {
    dependsOn assemble
    group "Build"
    description "Assembles a cap archive containing the main classes."

    doLast {
        ant.taskdef(name: 'javacard', classname: 'pro.javacard.ant.JavaCard', classpath: configurations.javacardAntTask.asPath)

        // Create build/card directory
        file('build/card').mkdirs()

        // 1PAY.SYS.DDF01 (Contact PSE)
        ant.javacard(jckit: "oracle_javacard_sdks/${jc_sdk}") {
            cap (
                package: 'emvcardsimulator',
                version: '0.1',
                output: 'build/card/pse.cap',
                jca: 'build/card/pse.jca',
                export: 'build/card/pse_export',
                classes: "build/classes/java/main",
                aid: '315041592E000000000000000000') {
                    applet (class: 'emvcardsimulator.PaymentSystemEnvironment', aid: '315041592E5359532E4444463031')
            }
        }

        // 2PAY.SYS.DDF01 (Contactless PPSE) - separate package
        ant.javacard(jckit: "oracle_javacard_sdks/${jc_sdk}") {
            cap (
                package: 'emvcardsimulator.ppse',
                version: '0.1',
                output: 'build/card/ppse.cap',
                jca: 'build/card/ppse.jca',
                export: 'build/card/ppse_export',
                classes: "build/classes/java/main",
                aid: '325041592E000000000000000000') {
                    applet (class: 'emvcardsimulator.ppse.ProximityPaymentSystemEnvironment', aid: '325041592E5359532E4444463031')
            }
        }

        ant.javacard(jckit: "oracle_javacard_sdks/${jc_sdk}") {
            cap (
                package: 'emvcardsimulator',
                version: '0.1',
                output: 'build/card/paymentapp.cap',
                jca: 'build/card/paymentapp.jca',
                export: 'build/card',
                classes: "build/classes/java/main",
                aid: paymentapp_cap_aid) {
                    applet (class: 'emvcardsimulator.PaymentApplication', aid: paymentapp_applet_aid)
            }
        }

        // Contactless payment app (same PaymentApplication class, different AID for T=1 protocol)
        ant.javacard(jckit: "oracle_javacard_sdks/${jc_sdk}") {
            cap (
                package: 'emvcardsimulator',
                version: '0.1',
                output: 'build/card/paymentapp_contactless.cap',
                jca: 'build/card/paymentapp_contactless.jca',
                export: 'build/card/paymentapp_contactless_export',
                classes: "build/classes/java/main",
                aid: paymentapp_contactless_cap_aid) {
                    applet (class: 'emvcardsimulator.PaymentApplication', aid: paymentapp_contactless_applet_aid)
            }
        }
    }
}

// force delete might sometimes be needed?
// java -jar gp.jar --delete A000000003 --force

task deployPse(type: Exec) {
    dependsOn downloadGp, cap
    group "JavaCard"
    description "Deploy PaymentSystemEnvironment applet to JavaCard"

    commandLine 'java', '-jar', 'gp.jar', '--force', '--install', 'build/card/pse.cap'
}

task deployPaymentApp(type: Exec) {
    dependsOn downloadGp, cap
    group "JavaCard"
    description "Deploy payment application applet to JavaCard"

    commandLine 'java', '-jar', 'gp.jar', '--force', '--install', 'build/card/paymentapp.cap'
}
