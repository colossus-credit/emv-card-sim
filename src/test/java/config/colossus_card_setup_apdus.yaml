# Colossus Credit Card Network Setup
# AID: A0000000951
# BIN: 67676767
# RSA-2048 only, CDA enabled, Forced online (ARQC)

# ═══════════════════════════════════════════════════════════════════
# INITIAL APPLICATION SELECTION
# ═══════════════════════════════════════════════════════════════════

# SELECT Command - Selects the payment application by its AID
# Function: Activates the Colossus payment application on the card
# Behavior: Selects AID A0000000951, returns FCI with application info
- req: '00 A4 04 00 06 A0 00 00 00 09 51'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CARD INITIALIZATION
# ═══════════════════════════════════════════════════════════════════

# Factory Reset - Clears all EMV tags and personalization data
# Function: Wipes all card data to prepare for fresh personalization
# Behavior: Clears all tags, templates, and logs (PIN/keys persist)
- req: '80 05 00 00 00'
  res: '90 00'

# CDA Mode Enable - Activates Combined Dynamic Data Authentication
# Function: Enables CDA for transaction authentication (no fallback to DDA/SDA)
# Behavior: Sets cdaEnabled=true, enforces RSA-2048, generates tag 9F4B during GENERATE AC
- req: '80 00 00 07 01 01'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# SECURITY SETTINGS
# ═══════════════════════════════════════════════════════════════════

# PIN Code - Card's PIN for ICC verification
# Function: Sets the 4-digit PIN stored on card for offline verification
# Behavior: PIN=1234, verified by card chip (not online), required for transactions >= $20
- req: '80 00 00 01 02 12 34'
  res: '90 00'

# Response Template Tag - Defines EMV response format
# Function: Specifies which TLV wrapper tag to use for structured responses
# Behavior: Uses tag 77 (Format 2, modern EMV standard) for GPO and GENERATE AC responses
- req: '80 00 00 02 02 00 77'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# ICC RSA-2048 KEY PAIR (CARD AUTHENTICATION)
# ═══════════════════════════════════════════════════════════════════

# ICC RSA-2048 Key Modulus - Public key component
# Function: The RSA public modulus used for CDA signature verification
# Behavior: 256-byte test key, terminals verify CDA signatures with this modulus
# NOTE: In production, use keys from ./generate-icc-cert.sh
- req: '80 00 00 04 FF 00 C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF'
  res: '90 00'

# ICC RSA-2048 Key Private Exponent - Secret key component  
# Function: The RSA private exponent used to generate CDA signatures
# Behavior: 256-byte test key, card uses this to sign transaction data (NEVER extractable)
# NOTE: In production, use keys from ./generate-icc-cert.sh
- req: '80 00 00 05 FF 00 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F 80 81 82 83 84 85 86 87 88 89 8A 8B 8C 8D 8E 8F'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# RESPONSE TEMPLATES (DEFINE WHAT DATA CARD RETURNS)
# ═══════════════════════════════════════════════════════════════════

# Template 1: GET PROCESSING OPTIONS Response
# Function: Defines which tags to return when terminal requests processing options
# Behavior: Returns tag 82 (AIP=1C01, CDA only) and tag 94 (AFL, file locations)
- req: '80 02 00 01 04 00 82 00 94'
  res: '90 00'

# Template 2: INTERNAL AUTHENTICATE Response (DDA)
# Function: Defines response for DDA authentication command
# Behavior: Returns tag 9F4B (signature), not used in Colossus (AIP blocks DDA)
- req: '80 02 00 02 02 9F 4B'
  res: '90 00'

# Template 3: GENERATE AC Response (CDA) - CRITICAL FOR COLOSSUS
# Function: Defines which tags to return during transaction authorization
# Behavior: Returns 9F27 (crypt type), 9F36 (ATC), 9F26 (ARQC), 9F4B (256-byte CDA sig), 9F10 (IAD)
- req: '80 02 00 03 0A 9F 27 9F 36 9F 26 9F 4B 9F 10'
  res: '90 00'

# Template 4: FCI (File Control Information) Response
# Function: Defines response structure for SELECT command
# Behavior: Returns tag 84 (AID: A0000000951) and tag A5 (app branding/info)
- req: '80 02 00 04 04 00 84 00 A5'
  res: '90 00'

# Template 5: FCI Proprietary Template (tag A5) Contents
# Function: Defines which application metadata tags to include in FCI
# Behavior: Returns label, language, priority, preferred name, code table index, PDOL
- req: '80 02 00 05 0C 00 50 5F 2D 00 87 9F 12 9F 11 9F 38'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# FILE STRUCTURE (READ RECORD TEMPLATES)
# ═══════════════════════════════════════════════════════════════════

# Record 1, SFI 12 (0x0C) - Track data
# Function: Defines which tags are in this file record
# Behavior: Contains track2 equivalent (57), cardholder name (5F20), track1 discretionary (9F1F)
- req: '80 03 02 0C 06 00 57 5F 20 9F 1F'
  res: '90 00'

# Record 1, SFI 20 (0x14) - ICC certificate data
# Function: Defines tags in first record of certificate file
# Behavior: Contains ICC public key cert (9F46), ICC exponent (9F47), DDOL (9F49)
- req: '80 03 01 14 06 9F 46 9F 47 9F 49'
  res: '90 00'

# Record 2, SFI 20 (0x14) - Issuer certificate data
# Function: Defines tags in second record of certificate file
# Behavior: Contains CA index (8F), Issuer exponent (9F32), Issuer cert (92), Issuer remainder (90)
- req: '80 03 02 14 08 00 8F 9F 32 00 92 00 90'
  res: '90 00'

# Record 1, SFI 28 (0x1C) - Application control data
# Function: Defines tags in first application data record
# Behavior: Contains expiry, PAN, PAN sequence, usage control, CVMLIST, TACs, floor limit, currency, SDA tag list
- req: '80 03 01 1C 14 5F 24 00 5A 5F 34 9F 07 00 8E 9F 0D 9F 0E 9F 0F 5F 28 9F 4A'
  res: '90 00'

# Record 2, SFI 28 (0x1C) - Transaction processing data
# Function: Defines tags in second application data record
# Behavior: Contains app currency (9F42), currency exponent (9F44), app version (9F08), CDOL1 (8C), CDOL2 (8D)
- req: '80 03 02 1C 0A 9F 42 9F 44 9F 08 00 8C 00 8D'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CARD IDENTIFICATION
# ═══════════════════════════════════════════════════════════════════

# ATC (Application Transaction Counter) - Prevents replay attacks
# Function: Counter that increments with each transaction (2 bytes, range 0-65535)
# Behavior: Starts at 1, increments to 2, 3, 4... included in ARQC, issuer detects duplicate ATCs
- req: '80 01 9F 36 02 00 01'
  res: '90 00'

# AID (Application Identifier) - Unique application ID
# Function: Identifies this as the Colossus payment application
# Behavior: A0000000951 - Colossus network identifier, used in SELECT command
- req: '80 01 00 84 06 A0 00 00 00 09 51'
  res: '90 00'

# Application Label - Short display name
# Function: Brief name shown on terminal during application selection
# Behavior: Displays "COLOSSUS" on terminal screen when card is inserted
- req: '80 01 00 50 08 43 4F 4C 4F 53 53 55 53'
  res: '90 00'

# Language Preference - Terminal prompt language
# Function: Specifies preferred language for terminal messages
# Behavior: English (en) - terminal shows "Enter PIN", "Approved", etc. in English
- req: '80 01 5F 2D 02 65 6E'
  res: '90 00'

# Application Priority Indicator - Multi-app selection priority
# Function: Determines order when multiple apps on card (lower=higher priority)
# Behavior: Priority 1 (highest), auto-selectable without cardholder confirmation (bit 8=0)
- req: '80 01 00 87 01 01'
  res: '90 00'

# Application Preferred Name - Extended display name
# Function: 15-character display name for terminal
# Behavior: Displays "COLOSSUS CREDIT" (padded with spaces) on terminal
- req: '80 01 9F 12 0F 43 4F 4C 4F 53 53 55 53 20 43 52 45 44 49 54 20 20'
  res: '90 00'

# Issuer Code Table Index - Character encoding
# Function: Defines character set for text fields
# Behavior: ISO 8859-1 (Latin-1) encoding for cardholder name and labels
- req: '80 01 9F 11 01 01'
  res: '90 00'

# PDOL (Processing Data Object List) - Data requested in GPO
# Function: Specifies what data terminal must provide in GET PROCESSING OPTIONS
# Behavior: Requests TTQ(4), Amount(6), AmountOther(6), Country(2), TVR(5), Currency(2), Date(3), Type(1), UN(4)
#           Total PDOL data: 33 bytes
- req: '80 01 9F 38 18 9F 66 04 9F 02 06 9F 03 06 9F 1A 02 95 05 5F 2A 02 9A 03 9C 01 9F 37 04'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CARD CAPABILITIES
# ═══════════════════════════════════════════════════════════════════

# AIP (Application Interchange Profile) - Card authentication capabilities
# Function: Declares which authentication methods card supports (SDA/DDA/CDA)
# Behavior: Byte1=1C (CVM+TRM+IssuerAuth), Byte2=01 (CDA ONLY, no SDA/DDA fallback)
- req: '80 01 00 82 02 1C 01'
  res: '90 00'

# AFL (Application File Locator) - File structure map
# Function: Tells terminal which files/records to read for certificates and data
# Behavior: Read SFI 8 records 2-2, SFI 16 records 1-2, SFI 24 records 1-2 (one for offline auth)
- req: '80 01 00 94 0C 08 02 02 00 10 01 02 00 18 01 02 01'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CARDHOLDER DATA
# ═══════════════════════════════════════════════════════════════════

# Track2 Equivalent Data - Magnetic stripe compatibility
# Function: Card data in Track 2 format for backward compatibility
# Behavior: PAN=67676767..., Expiry=2512, Service code=201, discretionary data, LRC
- req: '80 01 00 57 0F 67 67 67 67 12 34 56 78 D2 51 22 01 23 45 6F'
  res: '90 00'

# Cardholder Name - Account holder's name
# Function: Name embossed/printed on card
# Behavior: "COLOSSUS/CARDHOLDER" (20 chars, space-padded), shown on receipts
- req: '80 01 5F 20 14 43 4F 4C 4F 53 53 55 53 2F 43 41 52 44 48 4F 4C 44 45 52 20'
  res: '90 00'

# Track1 Discretionary Data - Issuer-specific magnetic stripe data
# Function: Additional Track 1 data (PIN verification values, CVV, issuer codes)
# Behavior: Contains issuer-defined codes: 122940000020000024900000000
- req: '80 01 9F 1F 18 31 32 32 39 34 30 30 30 30 30 32 30 30 30 30 32 34 39 30 30 30 30 30 30'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CERTIFICATE CHAIN (CARD AUTHENTICATION)
# ═══════════════════════════════════════════════════════════════════

# ICC Public Key Certificate - Card's certificate signed by Issuer
# Function: Certificate containing ICC public key, signed by Issuer private key
# Behavior: 256-byte cert (placeholder), terminals verify with Issuer public key, then verify CDA sigs with ICC public key
# NOTE: In production, use certificate from ./generate-icc-cert.sh
- req: '80 01 9F 46 FF 00 91 C0 3D C4 32 72 45 67 48 61 B3 29 C2 F2 E0 DA 63 69 68 6E CB F8 6A 20 1D A1 47 C5 2F 38 96 C3 4A 91 B6 67 85 6A D1 69 9C 6F 41 D8 80 CF 62 1C C2 46 F3 7A A3 67 71 81 BF BE 9B 97 F8 BE 98 F7 6F 83 2D 3C 5B 4E 2F B6 AC C0 A0 CF 11 D1 E3 28 99 82 37 96 1E B2 4D 27 B8 1D C6 99 DE 83 59 B1 07 48 EF 82 80 8D BD 51 5A 17 09 29 7B 51 D9 F2 3B B6 DB B7 56 80 54 4E 6A 8E 18 BE EF 2D 68 FB B5 9C B8 4E 77 3A FA C2 61 3A D1 66 16 20 F3 9C 10 5D 8D 66 C0 D2 D5 26 09 63 12 2D 9A FA 2B 90 8F FC FB 79 6B 3A 12 D3 CB 9A 8D 0E 4A 43 24 71 A1 A2 A3 A4 A5 A6 A7 A8 A9 AA AB AC AD AE AF B0 B1 B2 B3 B4 B5 B6 B7 B8 B9 BA BB BC BD BE BF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF'
  res: '90 00'

# ICC Public Key Exponent - RSA public exponent
# Function: RSA public exponent for ICC key (typically 3 or 65537)
# Behavior: Exponent=3, used with modulus to verify CDA signatures (faster verification)
- req: '80 01 9F 47 01 03'
  res: '90 00'

# DDOL (Dynamic Data Object List) - DDA challenge format
# Function: Specifies what data terminal should provide for DDA authentication
# Behavior: Requests tag 9F37 (4 bytes Unpredictable Number), not used in CDA mode
- req: '80 01 9F 49 03 9F 37 04'
  res: '90 00'

# CA Public Key Index - Certificate Authority identifier
# Function: Identifies which CAPK to use for verifying Issuer certificate
# Behavior: Index=0x92, terminals look up CAPK #92 to verify Issuer cert in chain
- req: '80 01 00 8F 01 92'
  res: '90 00'

# Issuer Public Key Exponent - RSA public exponent
# Function: RSA public exponent for Issuer key
# Behavior: Exponent=3, used to verify ICC certificate signed by Issuer
- req: '80 01 9F 32 01 03'
  res: '90 00'

# Issuer Public Key Certificate - Issuer's certificate signed by CAPK
# Function: Certificate containing Issuer public key, signed by CA private key
# Behavior: 36-byte cert (placeholder), terminals verify with CAPK #92, then use to verify ICC cert
# NOTE: In production, use certificate from ./generate-issuer-cert.sh
- req: '80 01 00 92 24 5F CE A1 52 B4 D9 EC 97 91 BF 30 96 72 FA 51 AF A9 56 2D 1C 0B 33 3E D6 1A 5A 20 00 40 C3 B5 0A 46 02 3B 89'
  res: '90 00'

# Issuer Public Key Remainder - Additional key data
# Function: Remainder of Issuer public key that didn't fit in certificate
# Behavior: 255 bytes remainder, combined with cert data to reconstruct full Issuer public key
# NOTE: In production, use remainder from ./generate-issuer-cert.sh
- req: '80 01 00 90 FF 00 20 08 FB 40 DD A8 99 99 AF 87 3A 0D 9B AB 15 8D 5A CE 11 34 4F E3 8F 72 05 3C C5 EC CF E4 96 BB A5 8B 37 D6 69 BA B2 CE AF 93 7F 32 97 35 E0 27 41 E7 12 2C 83 2B E3 3C D1 AA 38 D2 7C DA CC ED 8B 02 F0 EA 23 1C 7C 6B CB F8 23 9E CF 2C 11 95 4B 40 7D 58 E9 A6 89 AB 22 DF C9 98 02 2A 17 9F AF C6 19 AB C5 AB 23 7C 68 41 02 39 12 93 95 57 5E 62 3F 4F 8B A8 38 0A 39 07 AC F4 20 09 B8 C3 D3 0F D1 0F BB 91 B1 3D C0 14 B6 19 BA 58 4C E0 B9 AC 6F B1 D3 A4 A7 45 03 F6 90 88 7F 11 13 13 D0 10 A3 A7 11 7E 8C 04 44 87 46 D3 AA F8 88 EA B1 B2 B3 B4 B5 B6 B7 B8 B9 BA BB BC BD BE BF C0 C1 C2 C3 C4 C5 C6 C7 C8 C9 CA CB CC CD CE CF'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CARD LIFECYCLE DATA
# ═══════════════════════════════════════════════════════════════════

# Application Expiration Date - Card validity end date
# Function: Date after which card is no longer valid (YYMMDD format)
# Behavior: Expires 251231 (Dec 31, 2025), terminals reject after this date
- req: '80 01 5F 24 03 25 12 31'
  res: '90 00'

# PAN (Primary Account Number) - Card account number
# Function: Unique card number for this account
# Behavior: 67676767123456 (8-digit Colossus BIN + account), max 19 digits, included in all transactions
- req: '80 01 00 5A 08 67 67 67 67 12 34 56 78'
  res: '90 00'

# PAN Sequence Number - Card reissuance counter
# Function: Distinguishes multiple cards with same PAN (reissues, replacements)
# Behavior: Sequence=01 (first card), would be 02 for replacement, 03 for second replacement, etc.
- req: '80 01 5F 34 01 01'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# TRANSACTION RESTRICTIONS
# ═══════════════════════════════════════════════════════════════════

# Application Usage Control - Transaction type restrictions
# Function: 2-byte bitmap defining which transaction types are allowed
# Behavior: FF80 = All transaction types allowed domestically, international ATM restricted
- req: '80 01 9F 07 02 FF 80'
  res: '90 00'

# CVMLIST (Cardholder Verification Method List) - How to verify cardholder
# Function: Prioritized list of verification methods (PIN, signature, none)
# Behavior: Amount X=$20 (no CVM if <$20), Rules: 1) Encrypted PIN by ICC (≥$20), 2) Signature, 3) None
- req: '80 01 00 8E 0E 00 00 07 D0 00 00 00 00 44 00 1E 00 1F 00'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# TERMINAL ACTION CODES (TRANSACTION DECISION LOGIC)
# ═══════════════════════════════════════════════════════════════════

# Issuer Action Code - Default (TAC-Default) - Offline fallback behavior
# Function: Conditions that trigger DENIAL if terminal cannot go online
# Behavior: FF FF FF FF FF = All conditions trigger denial if offline (NO offline approvals)
- req: '80 01 9F 0D 05 FF FF FF FF FF'
  res: '90 00'

# Issuer Action Code - Denial (TAC-Denial) - Immediate denial conditions
# Function: Conditions that cause immediate transaction DENIAL without trying online
# Behavior: 00 10 80 00 00 = Deny for: wrong service type, failed cardholder verification
- req: '80 01 9F 0E 05 00 10 80 00 00'
  res: '90 00'

# Issuer Action Code - Online (TAC-Online) - Force online conditions
# Function: Conditions that force terminal to seek online authorization
# Behavior: FF FF FF FF FF = ALL conditions force online (every transaction requires online auth)
- req: '80 01 9F 0F 05 FF FF FF FF FF'
  res: '90 00'

# Terminal Floor Limit - Offline approval threshold
# Function: Transaction amount threshold for requiring online authorization
# Behavior: $0.00 = All amounts require online (no offline approvals even for small amounts)
- req: '80 01 9F 1B 04 00 00 00 00'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CURRENCY CONFIGURATION
# ═══════════════════════════════════════════════════════════════════

# Transaction Currency Code - Default transaction currency
# Function: Expected currency for transactions (validated against terminal's currency)
# Behavior: USD (840), card expects USD transactions, detects foreign currency if different
- req: '80 01 5F 28 02 08 40'
  res: '90 00'

# Application Currency Code - Card account currency
# Function: Currency in which cardholder's account is denominated
# Behavior: USD (840), account is in US dollars, matches transaction currency for domestic use
- req: '80 01 9F 42 02 08 40'
  res: '90 00'

# Application Currency Exponent - Decimal places for currency
# Function: Number of decimal places for currency amounts (per ISO 4217)
# Behavior: Exponent=2 (÷100), amounts stored in cents (e.g., 5000 = $50.00)
- req: '80 01 9F 44 01 02'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# AUTHENTICATION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════

# Static Data Authentication Tag List - SDA data elements
# Function: Specifies which tags to include in SDA hash (legacy compatibility)
# Behavior: Includes tag 82 (AIP) in SDA signature, protects capabilities from tampering
- req: '80 01 9F 4A 01 82'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# APPLICATION VERSION & PROTOCOL
# ═══════════════════════════════════════════════════════════════════

# Application Version Number - EMV specification version
# Function: Indicates which EMV version the application implements
# Behavior: Version 0x0096 (EMV 4.3 equivalent), ensures terminal compatibility
- req: '80 01 9F 08 02 00 96'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# CARD RISK MANAGEMENT DATA OBJECT LISTS (CDOL)
# ═══════════════════════════════════════════════════════════════════

# CDOL1 (Card Risk Management Data Object List 1) - First GENERATE AC data format
# Function: Defines what data terminal must provide in first GENERATE AC command
# Behavior: Requests 54 bytes: Amount(6), Amount Other(6), Country(2), TVR(5), Currency(2), 
#           Date(3), Type(1), UN(4), Terminal ID(8), Merchant ID(15), Acquirer ID(6)
#           Custom Colossus CDOL includes Terminal/Merchant/Acquirer tracking
- req: '80 01 00 8C 1E 9F 02 06 9F 03 06 9F 1A 02 95 05 5F 2A 02 9A 03 9C 01 9F 37 04 9F 1C 08 9F 16 0F 9F 01 06'
  res: '90 00'

# CDOL2 (Card Risk Management Data Object List 2) - Second GENERATE AC data format
# Function: Defines data format for second GENERATE AC (if needed)
# Behavior: 56 bytes: adds tag 8A (Authorization Response Code) at start, otherwise same as CDOL1
- req: '80 01 00 8D 20 8A 02 9F 02 06 9F 03 06 9F 1A 02 95 05 5F 2A 02 9A 03 9C 01 9F 37 04 9F 1C 08 9F 16 0F 9F 01 06'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# FCI DATA (APPLICATION SELECTION RESPONSE)
# ═══════════════════════════════════════════════════════════════════

# FCI Proprietary Template (tag A5) - Complete application metadata
# Function: Composite tag containing all application selection information
# Behavior: Contains label (COLOSSUS), language (en), priority (1), preferred name (COLOSSUS CREDIT), code table (1), PDOL
#           Returned during SELECT, terminals display this info to cardholder
- req: '80 01 00 A5 49 50 08 43 4F 4C 4F 53 53 55 53 5F 2D 02 65 6E 87 01 01 9F 12 0F 43 4F 4C 4F 53 53 55 53 20 43 52 45 44 49 54 20 20 9F 11 01 01 9F 38 18 9F 66 04 9F 02 06 9F 03 06 9F 1A 02 95 05 5F 2A 02 9A 03 9C 01 9F 37 04'
  res: '90 00'

# ═══════════════════════════════════════════════════════════════════
# TRANSACTION STATE DATA
# ═══════════════════════════════════════════════════════════════════

# CVM Results - Cardholder verification outcome
# Function: Records which verification method was used and whether it succeeded
# Behavior: Initial value 00 00 00 (no verification yet), updated during transaction
#           Example after PIN: 44 00 02 (Encrypted PIN by ICC, successful)
- req: '80 01 9F 34 03 00 00 00'
  res: '90 00'

# Issuer Application Data (IAD) - Issuer-proprietary data
# Function: Issuer-specific data sent with ARQC (format defined by issuer)
# Behavior: 7 bytes (placeholder), typically contains: CVN, CVR, key derivation info
#           Sent to issuer with every ARQC for cryptogram verification
- req: '80 01 9F 10 07 06 01 0A 03 A4 A0 02'
  res: '90 00'

