# Mastercard Test Profile — US Common Debit
# Uses Mastercard AID A0000000042203 for C-2 kernel testing on PAX terminal
# The applet must be installed with matching AID before using this profile

profile: Mastercard US Common Debit (C-2 Kernel)
rid: A000000004
contact_aid_suffix: "2203"
contactless_aid_suffix: "2203"
application_label: MASTERCARD
preferred_name: "DEBIT MASTERCARD"
bin: "54000000"
expiry: "271231"

# Kernel identifier for PPSE directory entry
# 02 = Mastercard kernel C-2 (auto-mapped for Mastercard AID, but explicit is safer)
