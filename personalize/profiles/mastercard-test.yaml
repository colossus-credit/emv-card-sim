# Mastercard Test Profile — C-2 kernel AID, default-profile crypto/data
# Identical to default.yaml except for the AID (A0000000042203).
# Same CAPK 92 (RSA-1984), same keys dir, same tags/records/AFL/CVM.
# The applet must be installed with matching AID before using this profile.

profile: Mastercard AID (Default crypto + data)
rid: A000000004
contact_aid_suffix: "2203"          # MC Debit PIX — 17:15 tap passed PREPROC with this AID
contactless_aid_suffix: "2203"      # MC Debit PIX — 17:15 tap passed PREPROC with this AID
application_label: COLOSSUS
preferred_name: "COLOSSUS CREDIT"
bin: "54545454"               # MC test BIN (5454... widely classified as Credit by Paymentech sys_bin.l)
pan: "5454545454545454"       # Classic MC test PAN, Luhn-valid
expiry: "271231"

# Kernel identifier for PPSE directory entry
# 02 = Mastercard kernel C-2 (auto-mapped for Mastercard AID, but explicit is safer)
kernel_identifier: "02"

keys:
  capk_index: "92"
  key_size: 1024      # ICC/Issuer RSA-1024, CAPK RSA-1984 (mixed hierarchy)
  keys_dir: ../../keys/capk_1984_mixed_mc  # Same CAPK 92 as default profile, but issuer cert has MC IIN 54000000

tags:
  # --- DOL definitions (match shell script: 11 tags, 30 bytes each) ---
  DDOL:
    type: dol
    value:
      Amount Authorised: 6
      Amount Other: 6
      Terminal Country Code: 2
      Terminal Verification Results: 5
      Transaction Currency Code: 2
      Transaction Date: 3
      Transaction Type: 1
      Unpredictable Number: 4
      Terminal Identification: 8
      Merchant Identifier: 15
      Acquirer Identifier: 6

  CDOL1:
    type: dol
    value:
      Amount Authorised: 6
      Amount Other: 6
      Terminal Country Code: 2
      Terminal Verification Results: 5
      Transaction Currency Code: 2
      Transaction Date: 3
      Transaction Type: 1
      Unpredictable Number: 4
      Terminal Identification: 8
      Merchant Identifier: 15
      Acquirer Identifier: 6

  CDOL2:
    type: dol
    value:
      Authorisation Response Code: 2
      Amount Authorised: 6
      Amount Other: 6
      Terminal Country Code: 2
      Terminal Verification Results: 5
      Transaction Currency Code: 2
      Transaction Date: 3
      Transaction Type: 1
      Unpredictable Number: 4
      Terminal Identification: 8
      Merchant Identifier: 15
      Acquirer Identifier: 6

  # --- Simple tag values ---
  Application Interchange Profile: "3C01"
  Application Version Number: "0002"
  Application Effective Date: "240101"
  Issuer Country Code: "0840"
  Application Usage Control: "AB00"
  SDA Tag List: "82"
  Track 1 Discretionary Data: "00000000000000000000000000000000000000"
  Service Code: "0701"
  Application Currency Code: "0840"
  Application Currency Exponent: "02"
  IAC-Default: "D84000A800"
  IAC-Denial: "0010000000"
  IAC-Online: "D84004F800"
  Issuer Code Table Index: "01"
  Language Preference: "656E"
  Issuer Application Data: "06010A03A4A002"
  # On C-2 kernel, tag 9F6E is Third Party Data (not Form Factor Indicator).
  # Format: CC(2) + UID(2) + [DeviceType(2)] + PropData(1-28), length 5-32.
  # 0840 = USA; UID high bit set avoids C-2 §3.10.2 DECLINE trigger; 00 = 1B prop data.
  # Once EC keys are loaded, generateEcdsaAtGpo() overwrites this with ECDSA s (32B).
  Form Factor Indicator: "0840800000"
  CTQ: "8000"

templates:
  gpo: ["AIP", "AFL"]
  dda: ["9F4B"]
  genac: ["9F27", "9F36", "9F26", "9F10"]
  fci:
    6f: ["DF Name", "A5"]
    a5: ["Application Label", "Application Priority Indicator"]

# Contactless overrides (merged on top of base tags/templates for contactless AID)
contactless:
  fci:
    a5: ["Application Label", "Application Priority Indicator", "Application Preferred Name", "Issuer Code Table Index", "Language Preference", "PDOL"]
  tags:
    Application Interchange Profile: "1980"
    PDOL:
      type: dol
      value:
        Amount Authorised: 6
        Amount Other: 6
        Terminal Country Code: 2
        Terminal Verification Results: 5
        Transaction Currency Code: 2
        Transaction Date: 3
        Transaction Type: 1
        Unpredictable Number: 4
        Terminal Identification: 8
        Merchant Category Code: 2   # 9F15 — ColossusNet spec §7.3
        Merchant Identifier: 15
        Acquirer Identifier: 6

records:
  - sfi: 1
    records:
      - record: 1
        tags: ["57", "5A", "5F24", "5F28", "5F34", "9F07", "8C"]
      - record: 2
        tags: ["5F20", "5F25", "8D", "8E", "9F0D", "9F0E", "9F0F", "9F4A"]
      - record: 3
        tags: ["5F30", "9F08", "9F42", "9F44", "9F49", "9F6E"]
  - sfi: 2
    records:
      - record: 1
        tags: ["8F", "92", "9F32", "9F47"]
      - record: 2
        tags: ["90"]
  - sfi: 3
    records:
      - record: 1
        tags: ["9F46"]
      - record: 2
        tags: ["9F48"]

afl:
  - sfi: 1
    first_record: 1
    last_record: 3
    oda_count: 0
  - sfi: 2
    first_record: 1
    last_record: 2
    oda_count: 1
  - sfi: 3
    first_record: 1
    last_record: 2
    oda_count: 0

settings:
  pin: "1234"
  flags:
    use_random: true
  response_template: "0080"

cvm_list:
  amount_x: 0
  amount_y: 0
  rules:
    - [0x42, 0x03]   # Online PIN, if terminal supports it
    - [0x1F, 0x00]   # No CVM required, always
