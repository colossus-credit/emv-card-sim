name: EMV Contactless Integration Test

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  contactless-kernel-test:
    name: Mastercard Contactless Kernel 2 (jcardsim + EMVPT)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/test/rust/simulator/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/test/rust/simulator/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build Rust simulator library
        working-directory: src/test/rust/simulator
        run: cargo build

      - name: Run contactless integration test
        run: ./gradlew contactlessTest --info
        env:
          RUST_BACKTRACE: 1

      - name: Test Summary
        if: always()
        run: |
          echo "## EMV Contactless Integration Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f build/reports/tests/contactlessTest/index.html ]; then
            echo "Test report generated. Check artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contactless-test-reports
          path: build/reports/tests/contactlessTest/
          if-no-files-found: ignore
