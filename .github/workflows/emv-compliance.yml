name: EMV Spec Compliance Report

on:
  pull_request:
    branches: [ master ]
    types: [ labeled ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  compliance-report:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'emv-compliance'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Checkout EMV specs (private)
        uses: actions/checkout@v4
        with:
          repository: colossus-credit/emv-specs
          token: ${{ secrets.SPECS_PAT }}
          path: .emv-specs

      - name: Install pdftotext
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Generate compliance report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6"
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            You are auditing an EMV JavaCard applet PR against the EMV specs.
            Your scope is the DIFF plus the CHANGED FILES only. You may read
            files that appear in the diff to resolve references (constants,
            method calls, tag definitions). You may NOT read unchanged files,
            browse the codebase, or explore outside the diff.

            ## Budget
            Stay under 15 minutes of wall-clock work. If you run out of time,
            post what you have.

            ## Spec search
            EMV spec PDFs are at .emv-specs/. Search ONE spec at a time with
            a targeted keyword. Never loop over all PDFs.
            ```bash
            pdftotext .emv-specs/EMV*Book_3*.pdf - | grep -i -A 8 -B 1 "keyword" | head -60
            ```
            Spec index (pick the right one — do not search all of them):
            - Book 1: ICC-Terminal interface, APDU structure, status words
            - Book 2: Security, CDA/DDA/SDA, certificates, cryptograms
            - Book 3: Application flow, tags, CVM, transaction processing
            - C-3: Visa contactless / qVSDC / MSD

            ## Step 1: Read the diff
            Run `git diff origin/master...HEAD`. That is your primary input.
            Use `git diff --stat` first to see which files changed.

            ## Step 2: Extract spec-relevant elements from the diff
            Scan the diff hunks for these elements only:
            - EMV tag references (e.g. 9F27, 5A, 82, 8C)
            - APDU status words (0x9000, 0x6A88, 0x6300, etc.)
            - Command handlers (SELECT, GPO, READ RECORD, GENERATE AC, VERIFY PIN, DDA, CDA)
            - AIP, AFL, CDOL, CVM List byte sequences
            - Certificate-chain fields (CA index, Issuer cert, ICC cert)
            - CID values (AAC/TC/ARQC)

            Ignore: formatting, refactors, comments, test-only code, and
            simulator test commands (CLA=0x80XX).

            Pick AT MOST 5 elements worth auditing. If the diff has none,
            post "No spec-relevant changes in this PR" and stop.

            ## Step 3: Check each element against the spec
            For each element:
            1. If the diff line references a constant or method defined in a
               changed file, read that file to resolve the reference. Only
               read changed files — never unchanged ones.
            2. Run ONE targeted pdftotext search against the right spec.
            3. Decide PASS or FLAG based on the resolved diff line plus the
               search result. Mark UNCERTAIN only if even the changed files
               don't give you enough to decide.

            Which spec to search:
            - Tag format/length/encoding → Book 3
            - Status words → Book 1 or Book 3
            - Command P1/P2/sequence → Book 3
            - PIN / CVM rules → Book 3
            - Signed data, certificates, cryptograms → Book 2
            - Contactless kernel behavior → C-3

            Target: one spec search per element. Two maximum.

            ## Step 4: Write the report
            Post as a PR comment in this format:

            ## EMV Spec Compliance Report

            ### Scope
            - One-line summary: what diff elements you checked, what you skipped

            ### Findings
            For each element (up to 5), use this exact format:

            #### [PASS|FLAG|UNCERTAIN] Short title
            - **Diff**: path/to/file:L123 (from the diff header)
            - **Spec**: Book N §X.Y.Z — section title
            - **Detail**: One or two sentences tied to the diff line.
              For FLAG: state what the diff shows vs what the spec requires.
              For UNCERTAIN: state what context you'd need to decide.

            ### Summary
            - X PASS, Y FLAG, Z UNCERTAIN
            - One-line overall assessment

            ## Rules
            - Only read files that appear in the diff. Never read unchanged files.
            - Search specs with pdftotext before citing a section — no memory
            - Reference specs by name and section number only
            - NEVER quote spec text verbatim — the comment is public
            - Skip simulator test commands (CLA=0x80XX)
